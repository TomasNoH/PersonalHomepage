<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f8ece6;
  font-family: 'EB Garamond', Georgia, serif;
  padding: 2.5rem clamp(1rem, 18vw, 18rem) 5rem;
}

.grid {
  display: flex;
  gap: 3rem;
  align-items: flex-start;
}

.column {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.cat { margin-bottom: 1.8rem; }

.cat-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.9rem;
  font-weight: 700;
  color: #666;
  cursor: default;
  transition: color 0.1s;
  line-height: 1.3;
  overflow: hidden;
}

.cat:hover .cat-name { color: #1a1008; }

.cat-body {
  max-height: 0;
  overflow: hidden;
  margin-top: 0;
  transition: max-height 0.28s ease-out, margin-top 0.2s ease-out;
}

.cat-body.open {
  max-height: 800px;
  margin-top: 1.4rem;
  transition: max-height 0.32s ease-in, margin-top 0.15s ease-in;
}



.plat-name {
  display: flex;
  align-items: baseline;
  font-size: 1.05rem;
  color: #777;
  line-height: 1.3;
  margin-bottom: 0.35rem;
  cursor: pointer;
  user-select: none;
}

.plat-name:hover { color: #444; }
.plat-name.selected { color: #1a1008; }

.plat-dash {
  flex-shrink: 0;
  width: 1.1em;
  opacity: 0;
}

.plat-name.selected .plat-dash { opacity: 1; }

.plat-text { flex: 1; }

.plat-name a {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
}

.plat-name a:hover { color: #1a1008; }

.no-search {
  color: inherit;
  font-size: 0.7rem;
  pointer-events: none;
}

.search-wrap {
  margin-top: 0.8rem;
  padding-top: 0;
}

.search-wrap input {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1.05rem;
  border: none;
  border-bottom: 1px solid #888;
  background: transparent;
  outline: none;
  width: 90%;
  color: #1a1008;
  padding: 0.1rem 0;
}

@media (max-width: 680px) {
  body {
    padding: 1.5rem 1.25rem 4rem;
  }

  .grid {
    flex-direction: column;
    gap: 0;
  }

  .column {
    display: contents;
  }

  .cat {
    margin-bottom: 0;
  }

function buildEFDSSUrl(query) {
  const json = JSON.stringify({ t:[{query,mode:"all",fields:["ALL"]}], m:"AND", at:"single[song-danceAndTune]" });
  return `https://archives.vwml.org/search/advanced:single[song-danceAndTune]/0_50/all/score_desc/_\u2EDE${encodeURIComponent(btoa(unescape(encodeURIComponent(json))))}`;
}

function buildUrl(plat, query) {
  if (plat.builder === 'efdss') return buildEFDSSUrl(query);
  if (!plat.u) return null;
  const enc = encodeURIComponent(query);
  return plat.u.split('SEARCHPLACEHOLDER').join(enc);
}

function hasSearch(plat) {
  if (plat.builder) return true;
  return plat.u && plat.u.includes('SEARCHPLACEHOLDER');
}

// column is an independent flex stack, so expanding a cat only pushes the
// items below it within that column. On mobile the columns dissolve via
// `display: contents` and each cat's `order` restores the original sequence.
const columns = [];

  const col = document.createElement('div');
  col.className = 'column';
  grid.appendChild(col);
  columns.push(col);
}

        if (body.classList.contains('open')) return;
        if (window._openBody && window._openBody !== body) {
          window._openBody.classList.remove('open');
        }
        body.classList.add('open');
        window._openBody = body;
        window._openCat = catEl;
      });
    } else {
      catEl.addEventListener('mouseenter', () => {
        // Close the previously-open body only if it has no selections;
        // a category with a selected platform stays pinned open.
        if (window._openBody && window._openBody !== body) {
          if (!window._openBody.querySelector('.plat-name.selected')) {
            window._openBody.classList.remove('open');
          }
        }
        body.classList.add('open');
        window._openBody = body;
        window._openCat = catEl;
        const gi = document.getElementById('global-input');
        if (gi) setTimeout(() => gi.focus(), 0);
      });
      catEl.addEventListener('mouseleave', () => {
        // Keep open if any platform has been selected in this category
        if (body.querySelector('.plat-name.selected')) return;
        body.classList.remove('open');
        if (window._openBody === body) {
          window._openBody = null;
          window._openCat = null;
        }
      });
    }

    columns[index % 4].appendChild(catEl);
});

// Pre-fill all search boxes from URL ?q= parameter (for CSE integration)


// ---- Global search bar ----
const globalBar = document.createElement('div');
globalBar.className = 'global-search';
const globalInput = document.createElement('input');
globalInput.type = 'text';
globalInput.id = 'global-input';
globalInput.setAttribute('autocomplete', 'off');
globalInput.setAttribute('spellcheck', 'false');
globalInput.setAttribute('placeholder', 'Directory ');
globalBar.appendChild(globalInput);
document.body.appendChild(globalBar);

// Shrink font to fit available width, with a floor
const _measurer = document.createElement('span');
_measurer.style.cssText = 'position:absolute;visibility:hidden;white-space:pre;font-family:"Playfair Display",Georgia,serif;font-weight:700;';
document.body.appendChild(_measurer);

function updateFontSize() {
  const isMobile = window.matchMedia('(max-width: 680px)').matches;
  const maxPx = isMobile ? 80 : 160;
  const minPx = isMobile ? 18 : 24;
  const text = globalInput.value || globalInput.placeholder || '';
  const available = globalInput.clientWidth;
  if (!available) { globalInput.style.fontSize = maxPx + 'px'; return; }
  // Measure the text at maxPx
  _measurer.style.fontSize = maxPx + 'px';
  _measurer.textContent = text;
  const naturalWidth = _measurer.offsetWidth;
  let target = maxPx;
  if (naturalWidth > available) {
    target = Math.max(minPx, Math.floor(maxPx * (available / naturalWidth)));
  }
  globalInput.style.fontSize = target + 'px';
}

globalInput.addEventListener('input', updateFontSize);
window.addEventListener('resize', updateFontSize);

// Scale column text down *uniformly* when any one element doesn't fit
// its column. Two-pass: first measure every element at the CSS-default
// size to find the tightest available/natural ratio, then apply that
// single ratio's font-size to every element in the group. This keeps the
// visual rhythm consistent rather than letting long words shrink while
// short ones stay large. Category names and platform names are fit as
// two independent groups — each scales on its own, against the same set
// of columns. Re-runs on resize and after web fonts finish loading, as
// Playfair Display and EB Garamond are both noticeably different from
// their fallbacks and first-pass measurements would otherwise be wrong.
function fitGroup(selector, baseRem, minRem) {
  const els = document.querySelectorAll(selector);
  // Reset any prior inline size so we measure against the CSS rule.
  els.forEach(n => { n.style.fontSize = ''; });
  if (window.matchMedia('(max-width: 680px)').matches) return;
  let minRatio = 1;
  els.forEach(el => {
    const col = el.closest('.column');
    if (!col) return;
    const available = col.clientWidth;
    const natural = el.scrollWidth;
    if (natural > 0 && available > 0) {
      minRatio = Math.min(minRatio, available / natural);
    }
  });
  if (minRatio < 1) {
    const scaled = Math.max(minRem, baseRem * minRatio);
    const size = scaled.toFixed(3) + 'rem';
    els.forEach(el => { el.style.fontSize = size; });
  }
}
function fitCatNames() {
  fitGroup('.cat-name',  1.9,  1.0);
  fitGroup('.plat-name', 1.05, 0.75);
}
window.addEventListener('resize', fitCatNames);
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(fitCatNames);
}

function fireGlobalSearch() {
  const q = globalInput.value.trim();
  if (!q) return;
  const selected = Array.from(document.querySelectorAll('.plat-name.selected'));
  if (!selected.length) {
    window.open(`https://www.qwant.com/?q=${encodeURIComponent(q)}&t=web`, '_blank');
    globalInput.value = '';
    updateFontSize();
    return;
  }
  const targets = selected.map(el => el._plat).filter(hasSearch);
  const isTouch = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  targets.forEach((plat, i) => {
    const url = buildUrl(plat, q);
    if (!url) return;
    if (isTouch) {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } else {
      setTimeout(() => window.open(url, '_blank'), i * 60);
    }
  });
  globalInput.value = '';
  updateFontSize();
}

globalInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  fireGlobalSearch();
});

// Enter anywhere on the page triggers search (unless typing into another input)
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.activeElement === globalInput) return;
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  e.preventDefault();
  globalInput.focus();
  fireGlobalSearch();
});

updateFontSize();
fitCatNames();
setTimeout(() => globalInput.focus(), 0);

// Pin the global search bar to the top of the mobile keyboard, and fill
// the gap below it with a plain opaque div (the "blind").
// iOS Safari treats `position: fixed` as relative to the layout viewport,
// which doesn't shrink when the keyboard opens — so the bar would otherwise
// sit hidden behind the keyboard. The visualViewport API gives us the actual
// visible region; we translate the bar up by the difference (the keyboard
// height), and simultaneously set the blind's height to that same value so
// the strip between the bar and the screen bottom is covered. The blind is
// a separate sibling div — not a pseudo-element or an extension of the bar
// itself — so Safari has nothing to clip during the transform.
const searchBlind = document.createElement('div');
searchBlind.id = 'search-blind';
globalBar.appendChild(searchBlind);

if (window.visualViewport) {
  const vv = window.visualViewport;
  let rafId = 0;
  const positionBar = () => {
    cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(() => {
      const offset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      globalBar.style.transform = offset > 0 ? `translateY(-${offset}px)` : '';
      searchBlind.style.height = offset > 0 ? `${offset}px` : '0';
    });
  };
  vv.addEventListener('resize', positionBar);
  vv.addEventListener('scroll', positionBar);
  positionBar();
}

// Preload query from URL ?q= parameter (for CSE integration)
(function preloadQuery() {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q');
  if (!q) return;
  globalInput.value = q;
  updateFontSize();
  history.replaceState(null, '', window.location.pathname);
})();
</script>
