<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f8ece6;
  font-family: 'EB Garamond', Georgia, serif;
  padding: 2.5rem clamp(1rem, 18vw, 18rem) 5rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0 3rem;
  align-items: start;
}

.cat { margin-bottom: 1.8rem; }

.cat-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.9rem;
  font-weight: 700;
  color: #666;
  cursor: default;
  transition: color 0.1s;
  line-height: 1.3;
}

.cat:hover .cat-name { color: #1a1008; }

.cat-body {
  max-height: 0;
  overflow: hidden;
  margin-top: 0;
  transition: max-height 0.28s ease-out, margin-top 0.2s ease-out;
}

.cat-body.open {
  max-height: 800px;
  margin-top: 1.4rem;
  transition: max-height 0.32s ease-in, margin-top 0.15s ease-in;
}



.plat-name {
  display: flex;
  align-items: baseline;
  font-size: 1.05rem;
  color: #777;
  line-height: 1.3;
  margin-bottom: 0.35rem;
  cursor: pointer;
  user-select: none;
}

.plat-name:hover { color: #444; }
.plat-name.selected { color: #1a1008; }

.plat-dash {
  flex-shrink: 0;
  width: 1.1em;
  opacity: 0;
}

.plat-name.selected .plat-dash { opacity: 1; }

.plat-text { flex: 1; }

.plat-name a {
  color: inherit;
  text-decoration: none;
  cursor: pointer;
}

.plat-name a:hover { color: #1a1008; }

.no-search {
  color: inherit;
  font-size: 0.7rem;
  pointer-events: none;
}

.search-wrap {
  margin-top: 0.8rem;
  padding-top: 0;
}

.search-wrap input {
  font-family: 'EB Garamond', Georgia, serif;
  font-size: 1.05rem;
  border: none;
  border-bottom: 1px solid #888;
  background: transparent;
  outline: none;
  width: 90%;
  color: #1a1008;
  padding: 0.1rem 0;
}

@media (max-width: 680px) {
  body {
    padding: 1.5rem 1.25rem 4rem;
  }

  .grid {
    grid-template-columns: 1fr;
    gap: 0;
  }

  .cat {
    margin-bottom: 0;
  }

  .cat-name {
    font-size: 2.6rem;
    padding: 0.6rem 0;
    cursor: pointer;
  }

  .cat-body.open {
    margin-top: 0.5rem;
  }

  .plat-name {
    font-size: 1rem;
    padding: 0.25rem 0;
  }

  .search-wrap input {
    font-size: 1rem;
    padding: 0.4rem 0;
  }
}
</style>

function buildEFDSSUrl(query) {
  const json = JSON.stringify({ t:[{query,mode:"all",fields:["ALL"]}], m:"AND", at:"single[song-danceAndTune]" });
  return `https://archives.vwml.org/search/advanced:single[song-danceAndTune]/0_50/all/score_desc/_\u2EDE${encodeURIComponent(btoa(unescape(encodeURIComponent(json))))}`;
}

function buildUrl(plat, query) {
  if (plat.builder === 'efdss') return buildEFDSSUrl(query);
  if (!plat.u) return null;
  const enc = encodeURIComponent(query);
  return plat.u.split('SEARCHPLACEHOLDER').join(enc);
}

function hasSearch(plat) {
  if (plat.builder) return true;
  return plat.u && plat.u.includes('SEARCHPLACEHOLDER');
}

const grid = document.getElementById('grid');

// Mobile: tap outside closes open category
document.addEventListener('click', () => {
  if (window._openBody) {
    window._openBody.classList.remove('open');
    window._openBody = null;
  }
});

DATA.forEach(cat => {
    const catEl = document.createElement('div');
    catEl.className = 'cat';

    const nameEl = document.createElement('div');
    nameEl.className = 'cat-name';
    nameEl.textContent = cat.name;
    catEl.appendChild(nameEl);

    const body = document.createElement('div');
    body.className = 'cat-body';

    const allPlats = cat.subs.flatMap(s => s.platforms);

    cat.subs.forEach((sub, si) => {
      if (si > 0) {
        const spacer = document.createElement('div');
        spacer.style.height = '0.6rem';
        body.appendChild(spacer);
      }
      sub.platforms.forEach(plat => {
        const p = document.createElement('div');
        p.className = 'plat-name';
        p._plat = plat;
        const dash = document.createElement('span');
        dash.className = 'plat-dash';
        dash.textContent = '–';
        p.appendChild(dash);
        if (!hasSearch(plat)) {
          p.classList.add('link-only');
          const link = document.createElement('a');
          link.href = plat.u || '#';
          link.target = '_blank';
          link.className = 'plat-text';
          link.textContent = plat.n;
          p.appendChild(link);
          const x = document.createElement('span');
          x.className = 'no-search';
          x.textContent = ' ✕';
          p.appendChild(x);
        } else {
          const txt = document.createElement('span');
          txt.className = 'plat-text';
          txt.textContent = plat.n;
          p.appendChild(txt);
          p.addEventListener('click', e => {
            e.stopPropagation();
            p.classList.toggle('selected');
          });
        }
        body.appendChild(p);
      });
    });

    // Single cross-search box
    const wrap = document.createElement('div');
    wrap.className = 'search-wrap';
    const input = document.createElement('input');
    input.type = 'text';
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('spellcheck', 'false');
    input.setAttribute('placeholder', '');

    input.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const q = input.value.trim();
      if (!q) return;
      const selected = Array.from(body.querySelectorAll('.plat-name.selected'));
      const targets = selected.length
        ? selected.map(el => el._plat).filter(hasSearch)
        : allPlats.filter(hasSearch);
      targets.forEach((plat, i) => {
        const url = buildUrl(plat, q);
        if (url) setTimeout(() => window.open(url, '_blank'), i * 60);
      });
      input.value = '';
    });

    wrap.appendChild(input);
    body.appendChild(wrap);
    catEl.appendChild(body);

    // Touch vs mouse behaviour
    const isTouch = () => window.matchMedia('(hover: none) and (pointer: coarse)').matches;

    if (isTouch()) {
      nameEl.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = body.classList.contains('open');
        if (window._openBody && window._openBody !== body) {
          window._openBody.classList.remove('open');
        }
        body.classList.toggle('open', !isOpen);
        window._openBody = isOpen ? null : body;
        if (!isOpen) setTimeout(() => input.focus(), 320);
      });
    } else {
      catEl.addEventListener('mouseenter', () => {
        if (window._openBody && window._openBody !== body) {
          window._openBody.classList.remove('open');
        }
        body.classList.add('open');
        window._openBody = body;
        setTimeout(() => input.focus(), 0);
      });
      catEl.addEventListener('mouseleave', () => {
        body.classList.remove('open');
        if (window._openBody === body) window._openBody = null;
      });
    }

    grid.appendChild(catEl);
});
